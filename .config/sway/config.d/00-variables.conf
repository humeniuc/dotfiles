### Variables
#
# Logo key. Use Mod1 for Alt.
set $mod Mod4
set $mod1 Mod1
# Home row direction keys, like vim
set $left h
set $down j
set $up k
set $right l
# Your preferred terminal emulator
set $term "${DOTFILES_PATH}/bin/system/sensible-terminal"
# Your preferred application launcher
# set $menu wmenu-run
set $menu "${DOTFILES_PATH}/bin/system/program_launcher"
